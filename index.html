<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f9a8c1" />
  <title>코바늘 기초기법</title>
  <link rel="stylesheet" href="style.css?v=13" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32.png?v=2" />
  <link rel="apple-touch-icon" href="apple-touch-icon.png?v=2" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="코바늘 기초" />
</head>
<body>
  <a id="promo-banner" class="promo-banner" href="https://smartstore.naver.com/knittingfriend/products/13403789743" target="_blank" rel="noopener" hidden>
    <img class="promo-img" src="barknit-banner.png?v=2" alt="" />
    <span class="promo-dday" id="promo-dday">D-13</span>
    <span class="promo-text">털실, 이제 그만 굴러다녀. 뜨개를 도와주는 멀티툴 [바니트]</span>
    <span class="promo-cta">보러가기 →</span>
  </a>

  <header class="app-header">
    <div class="title-row">
      <img class="logo" src="logo.png" alt="뭉치공방" />
      <div class="title-text">
        <h1 id="playlist-title">코바늘 기초기법</h1>
        <p id="playlist-meta" class="meta"></p>
      </div>
      <div class="links">
        <a class="link-btn link-ig" href="https://www.instagram.com/moongci_gongbang" target="_blank" rel="noopener" aria-label="인스타그램">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
            <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
            <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
          </svg>
          <span>인스타그램</span>
        </a>
        <a class="link-btn link-store" href="https://smartstore.naver.com/moongcija" target="_blank" rel="noopener" aria-label="스마트스토어">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
            <line x1="3" y1="6" x2="21" y2="6"/>
            <path d="M16 10a4 4 0 0 1-8 0"/>
          </svg>
          <span>스마트스토어</span>
        </a>
      </div>
    </div>
    <div class="search-wrap">
      <input
        id="search"
        type="search"
        placeholder="기법 이름으로 검색 (예: 짧은뜨기, magic ring)"
        autocomplete="off"
        spellcheck="false"
      />
      <button id="clear-btn" type="button" aria-label="검색어 지우기" hidden>✕</button>
    </div>
    <p id="result-count" class="result-count"></p>
  </header>

  <main>
    <div id="grid" class="grid" aria-live="polite"></div>
    <p id="empty" class="empty" hidden>검색 결과가 없습니다.</p>

    <section id="products-section" class="products-section" hidden>
      <div class="section-header">
        <h2>🎁 뜨린이 추천 상품</h2>
        <p>코바늘 입문에 도움이 되는 상품을 소개해요</p>
      </div>
      <div id="products-grid" class="grid"></div>
      <a class="store-cta" href="https://smartstore.naver.com/moongcija/products/12026524206" target="_blank" rel="noopener">
        스마트스토어에서 자세히 보기 →
      </a>
    </section>
  </main>

  <div id="modal" class="modal" hidden>
    <div class="modal-backdrop" data-close></div>
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <button class="modal-close" type="button" data-close aria-label="닫기">✕</button>
      <div class="modal-player">
        <iframe id="player" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
      </div>
      <h2 id="modal-title"></h2>
      <a id="modal-open-yt" target="_blank" rel="noopener" class="yt-link">YouTube에서 보기 ↗</a>
    </div>
  </div>

  <footer class="app-footer">
    <a href="https://www.youtube.com/playlist?list=PLHfcFNenGFHCTBmwUxo_qXw_BPE1mDtot" target="_blank" rel="noopener">원본 재생목록 보기 ↗</a>
  </footer>

  <script src="app.js?v=9"></script>
</body>
</html>
